# Render deployment configuration
# Deploys ONLY the backend service from the server/ directory.
#
# IMPORTANT: The live backend is served at home-interior-backend.onrender.com
# (verified). The service name MUST match that subdomain so `render deploy`
# updates the correct service. If this name drifts from the live subdomain,
# a second, orphaned service gets created and the public site stops receiving
# deploys. The database instance name below is independent of the service name.

services:
  - type: web
    name: home-interior-backend
    runtime: node
    rootDir: server
    # Install all deps so prisma CLI is available, then generate client + migrate.
    buildCommand: cd server && npm install && npx prisma generate && npx prisma migrate deploy
    # Start the backend from server/ so npm finds server/package.json.
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_CONNECTION_URL
        value: postgresql://postgres.amcaogrlsrwxbvuglyle:gQ58tSEI8LPSk6LV@aws-1-eu-west-2.pooler.supabase.com:6543/postgres?sslmode=require&connect_timeout=15&pgbouncer=true
      - key: DATABASE_URL
        value: postgresql://postgres.amcaogrlsrwxbvuglyle:gQ58tSEI8LPSk6LV@aws-1-eu-west-2.pooler.supabase.com:6543/postgres?sslmode=require&connect_timeout=15&pgbouncer=true
      - key: JWT_ACCESS_SECRET
        value: REPLACE_WITH_SECURE_RANDOM_STRING_MIN_32_CHARS
      - key: JWT_REFRESH_SECRET
        value: REPLACE_WITH_SECURE_RANDOM_STRING_MIN_32_CHARS
      - key: CLIENT_URL
        value: https://homy-comfy.netlify.app
      - key: SEED_ADMIN_EMAIL
        value: admin@hokinterior.com
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: REPLACE_WITH_YOUR_CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        value: REPLACE_WITH_YOUR_CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        value: REPLACE_WITH_YOUR_CLOUDINARY_API_SECRET
      - key: EMAIL_FROM
        value: info@hokinterior.com
