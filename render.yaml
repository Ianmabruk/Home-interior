# Render deployment configuration
# Deploys ONLY the backend service from the server/ directory.
#
# IMPORTANT: Update the database name in DATABASE_URL if your Neon
# database instance is not named "hok-interior-db".

services:
  - type: web
    name: hok-interior-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hok-interior-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://homy-comfy.netlify.app
      - key: SEED_ADMIN_EMAIL
        value: admin@hokinterior.com
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
